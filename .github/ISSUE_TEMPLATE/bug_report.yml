name: Bug report
description: Report something that isn't working the way it should
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill in as much as you can.
        Check the [troubleshooting guide](https://bridgeware-dynamics-business.github.io/Vibebar/help/troubleshooting) first.
        Do **not** report security vulnerabilities here — use the Security tab instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open VibeBar
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: VibeBar version
      placeholder: e.g. 1.0.0
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Other (note in description)
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.3.0
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output or attach screenshots. Redact secrets first.
      render: shell
    validations:
      required: false
